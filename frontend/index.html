    output("BRANCH 1!");

        output("BRANCH 4!");

        output("BRANCH 5!");
        IF (TRUE EQ FALSE) BRANCH;
            output("BRANCH 7!");
        ELSE IF (TRUE EQ FALSE) BRANCH;
            output("BRANCH 8!");
        ELSE BRANCH;
            output("BRANCH 9!");
        END;
    ELSE BRANCH;
        output("BRANCH 6!");
    END;
ELSE IF (TRUE EQ FALSE) BRANCH;
    output("BRANCH 2!");
ELSE BRANCH;
    output("BRANCH 3!");
END;

ARRAY BOOLEAN bool_arr1 = [TRUE,FALSE,TRUE,FALSE,TRUE,FALSE,TRUE,FALSE,TRUE,FALSE];
ARRAY STRING str_arr1 = ["STRING 1","STRING 2","STRING 3","STRING 4","STRING 5","STRING 6","STRING 7","STRING 8","STRING 9","STRING 10"];
INTEGER arraySize;
arraySize =

output("char_arr1:");
output(char_arr1);
output("bool_arr1:");
output(bool_arr1);
output("str_arr1:");
output(str_arr1);

output("");
output("=====");

FOR LOOP (INTEGER index = 0; index LT arraySize; index++) BRANCH;
    output("index:");
    output(index);
    INTEGER int_item;
    DECIMAL dec_item;
    CHARACTER char_item;
    BOOLEAN bool_item;
    STRING str_item;
    int_item = int_arr1[index];
    dec_item = dec_arr1[index];
    char_item = char_arr1[index];
    bool_item = bool_arr1[index];
    str_item = str_arr1[index];
    output("int_item:");
    output(int_item);
    output("dec_item:");
    output(dec_item);
    output("char_item:");
    output(char_item);
    output("bool_item:");
    output(bool_item);
    output("str_item:");
    output(str_item);
FOR END;

output("");
output("=====");

INTEGER index2 = arraySize;

WHILE LOOP (index2 GT 0) BRANCH;
    index2 = index2 - 1;
    output("index2:");
    output(index2);
    INTEGER int_item2;
    DECIMAL dec_item2;
    CHARACTER char_item2;
    BOOLEAN bool_item2;
    STRING str_item2;
    int_item2 = int_arr1[index2];
    dec_item2 = dec_arr1[index2];
    char_item2 = char_arr1[index2];
    bool_item2 = bool_arr1[index2];
    str_item2 = str_arr1[index2];
    output("int_item2:");
    output(int_item2);
    output("dec_item2:");
    output(dec_item2);
    output("char_item2:");

WHILE END;

VOID FUNCTION voidFunction() BRANCH;
    output("VOID FUNCTION!");
    RETURN VOID;
FUNCTION END;

INTEGER FUNCTION intFunction(INTEGER int1) BRANCH;
    output("INTEGER FUNCTION!");
    output("int1:");
    output(int1);
    RETURN int1;
FUNCTION END;

DECIMAL FUNCTION decFunction(DECIMAL dec1) BRANCH;
    output("DECIMAL FUNCTION!");
    output("dec1:");
    output(dec1);
    RETURN dec1;
FUNCTION END;

CHARACTER FUNCTION charFunction(CHARACTER char1) BRANCH;
    output("CHARACTER FUNCTION!");

    output(char1);
    RETURN char1;
FUNCTION END;

BOOLEAN FUNCTION boolFunction(BOOLEAN bool1) BRANCH;
    output("BOOLEAN FUNCTION!");
    output("bool1:");
    output(bool1);
    RETURN bool1;
FUNCTION END;

STRING FUNCTION stringFunction(STRING str1) BRANCH;
    output("STRING FUNCTION!");
    output("str1:");
    output(str1);
    RETURN str1;
FUNCTION END;
