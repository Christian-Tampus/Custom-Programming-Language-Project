<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Custom Programming Language Project</title>
        <author>Christian Tampus</author>
        <link rel = "stylesheet" href = "./styles.css">
    </head>
    <body>
        <div id = "title-author-div">
            <h1 id = "title" class = "title-author-class">Custom Programming Language Project</h1>
            <h2 id = "author" class = "title-author-class">Developed By: Christian Tampus</h2>
        </div>
        <div id = "button-div">
            <button id = "light-theme-button" class = "button" title = "Change To Light Editor Theme">Light Theme</button>
            <button id = "dark-theme-button" class = "button" title = "Change To Dark Editor Theme">Dark Theme</button>
            <button id = "run-code-button" class = "button" title = "Compile & Execute Code">▶ Run Code</button>
        </div>
        <div id = "text-editor-div" title = "Code Editor">
            <div id = "line-numbers" title = "Code Editor"></div>
            <textarea id = "text-editor" type = "text" placeholder = "" title = "Code Editor"></textarea>
        </div>
        <div id = "terminal-div" title = "Standard Output Terminal">
            <textarea id = "terminal" class = "div-container-css" placeholder="" title = "Standard Output Terminal" readonly></textarea>
        </div>
        <div id = "terminal-input-div" title = "Standard Input Terminal">
            <input id = "terminal-input" class = "div-container-css" type = "text" name = "terminal-input" placeholder = "" title = "Standard Input Terminal"/>
        </div>
        <div id = "documentation-div" title = "Code Documentation">
            <textarea id = "documentation" class = "div-container-css" placeholder = "" title = "Code Documentation" readonly></textarea>
        </div>
        <script src = "./script.js"></script>
    </body>
</html>
