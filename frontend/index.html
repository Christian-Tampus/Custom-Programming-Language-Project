<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>Custom Programming Language Project</title>
        <author>Christian Tampus</author>
        <link rel = "stylesheet" href = "./styles.css">
    </head>
    <body>
        <div id = "title-author-div">
            <h1 id = "title" class = "title-author-class">Custom Programming Language Project</h1>
            <h2 id = "author" class = "title-author-class">Developed By: Christian Tampus</h2>
        </div>
        <div id = "button-div">
            <button id = "light-theme-button" class = "button">Light Theme</button>
            <button id = "dark-theme-button" class = "button">Dark Theme</button>
        </div>
        <div id = "text-editor-div">
            <div id = "line-numbers"></div>
            <textarea id = "text-editor" type = "text" placeholder = ""></textarea>
        </div>
        <div id = "terminal-div">
            <textarea id = "terminal" placeholder="" readonly></textarea>
        </div>
        <div id = "terminal-input-div">
            <input id = "terminal-input" type = "text" name = "terminal-input" placeholder = ""/>
        </div>
        <div id = "documentation-div">
            <textarea id = "documentation" placeholder = "" readonly></textarea>
        </div>
        <script src = "./script.js"></script>
    </body>
</html>
